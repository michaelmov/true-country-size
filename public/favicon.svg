<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- Globe outline -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#e5e7eb" stroke-width="3"/>

  <!-- Divider -->
  <line x1="32" y1="10" x2="32" y2="54" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Left side: distorted Mercator feel -->
  <path d="M14 20 C20 18, 26 18, 32 20" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M14 32 C20 32, 26 32, 32 32" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M14 44 C20 46, 26 46, 32 44" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right side: corrected globe feel -->
  <path d="M32 20 C38 22, 44 22, 50 20" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M32 32 C38 32, 44 32, 50 32" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M32 44 C38 42, 44 42, 50 44" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
</svg>